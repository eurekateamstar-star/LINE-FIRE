<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>火場戰術指揮系統 - 緊湊十字版</title>
    <style>
        :root {
            --frame-gray: #3a3f42;
            --inner-bg: #121416;
            --neon-blue: #3399ff;
            --neon-red: #ff4d4d;
            --neon-gold: #ffcc00;
            --safe-green: #28a745;
        }

        * { box-sizing: border-box; }
        body { 
            font-family: 'Noto Sans TC', '微軟正黑體', sans-serif; 
            background-color: #050505; 
            color: #eee; 
            margin: 0; padding: 0; 
            height: 100vh; /* 鎖定滿版高度 */
            width: 100vw; 
            overflow: hidden; /* 禁止整個網頁滑動 */
            display: flex; flex-direction: column;
        }

        /* --- 極致緊湊的頂部列 --- */
        .compact-header {
            display: flex; justify-content: space-between; align-items: center;
            background: #111; border-bottom: 2px solid #333;
            padding: 5px 8px; height: 60px; flex-shrink: 0;
        }

        /* 左側：案件資訊 (字體縮小) */
        .header-left { display: flex; flex-direction: column; max-width: 40%; }
        #task-type { color: var(--neon-red); font-size: 15px; font-weight: 900; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        #task-address { color: var(--neon-blue); font-size: 10px; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* 中間：總人數 */
        .header-center { text-align: center; }
        .stat-label { font-size: 10px; color: #888; font-weight: bold; }
        .stat-val { font-size: 22px; color: var(--neon-gold); font-family: Impact, sans-serif; line-height: 1; margin-top: 2px; }

        /* 右側：時間與按鈕 */
        .header-right { display: flex; flex-direction: column; align-items: flex-end; }
        #live-clock { color: #0f0; font-size: 15px; font-family: monospace; font-weight: bold; }
        #history-btn { 
            background: #333; border: 1px solid #555; color: #fff; 
            font-size: 10px; border-radius: 4px; padding: 3px 6px; 
            margin-top: 4px; font-weight: bold;
        }

        /* --- 手機版十字網格 (關鍵技術) --- */
        .tactical-grid { 
            display: grid; flex-grow: 1; padding: 4px; gap: 4px;
            /* 將中間(core)設為 1.4 比例，讓內部入室有稍微大一點的空間 */
            grid-template-columns: 1fr 1.4fr 1fr; 
            grid-template-rows: 1fr 1.4fr 1fr; 
            grid-template-areas: 
                ". s3 ." 
                "s2 core s4" 
                ". s1 ."; 
            height: calc(100vh - 60px); /* 扣掉標題列高度 */
        }

        /* 區域外框 */
        .heavy-sector { 
            background: var(--inner-bg); border: 2px solid var(--frame-gray);
            border-radius: 4px; display: flex; flex-direction: column; overflow: hidden;
        }

        /* 縮寫標題列 */
        .sector-head { 
            background: #2a2d31; padding: 3px 5px; font-size: 11px; font-weight: bold;
            border-bottom: 1px solid #000; display: flex; justify-content: space-between;
            align-items: center; color: #ccc;
        }
        .sector-count { 
            background: #000; color: var(--neon-gold); 
            padding: 1px 5px; border-radius: 8px; font-size: 11px; border: 1px solid #444;
        }

        /* 內部入室區 */
        #zone-center { grid-area: core; border-color: #5a1a1a; box-shadow: inset 0 0 15px rgba(255, 51, 51, 0.15); }
        #zone-center .sector-head { background: #660000; color: #fff; border-bottom: 1px solid var(--neon-red); }
        
        #zone-1 { grid-area: s1; border-top: 2px solid var(--neon-blue); } 
        #zone-2 { grid-area: s2; border-right: 2px solid var(--neon-blue); } 
        #zone-3 { grid-area: s3; border-bottom: 2px solid var(--neon-blue); } 
        #zone-4 { grid-area: s4; border-left: 2px solid var(--neon-blue); } 

        /* 隊伍列表 (獨立滾動) */
        .unit-list { flex-grow: 1; overflow-y: auto; padding: 3px; display: flex; flex-direction: column; gap: 4px; }

        /* --- 緊湊型卡片 --- */
        .unit-plate { 
            background: #1a1c1e; border: 1px solid #333; 
            border-left: 4px solid var(--safe-green);
            padding: 4px 6px; border-radius: 3px;
        }
        #zone-center .unit-plate { border-left-color: var(--neon-red); }

        .plate-row { display: flex; justify-content: space-between; align-items: baseline; }
        
        .unit-name { font-weight: bold; color: var(--neon-gold); font-size: 12px; }
        .unit-pax { color: #fff; font-size: 11px; background: #000; padding: 0 3px; border-radius: 2px; }
        
        .unit-task { color: #ccc; font-size: 10px; font-weight: bold; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 60%;}
        .unit-time { color: var(--neon-blue); font-family: monospace; font-size: 9px; }

        /* 歷史紀錄彈出視窗 */
        .modal { display: none; position: fixed; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); }
        .modal-box { background: #1a1c1e; border: 2px solid #555; width: 90%; margin: 15% auto; max-height: 70vh; border-radius: 6px; display: flex; flex-direction: column; }
        .modal-head { padding: 10px; background: #000; color: var(--neon-gold); font-size: 14px; font-weight: bold; text-align: center; border-bottom: 1px solid #444; }
        .log-item { padding: 8px; border-bottom: 1px solid #333; color: #ccc; font-size: 12px; }
        .close-btn { background: #aa0000; color: #fff; border: none; padding: 12px; font-weight: bold; cursor: pointer; font-size: 14px; }
        
        /* 隱藏捲軸使其更美觀 */
        ::-webkit-scrollbar { display: none; } 
    </style>
</head>
<body>

    <!-- 緊湊型頂部列 -->
    <div class="compact-header">
        <div class="header-left">
            <h1 id="task-type">待命中</h1>
            <div id="task-address">等待指令...</div>
        </div>
        <div class="header-center">
            <span class="stat-label">總人數</span>
            <div class="stat-val" id="grand-total">0</div>
        </div>
        <div class="header-right">
            <span id="live-clock">00:00:00</span>
            <button id="history-btn" onclick="document.getElementById('history-modal').style.display='block'">歷史紀錄</button>
        </div>
    </div>

    <!-- 十字佈署網格 -->
    <div class="tactical-grid">
        <div id="zone-3" class="heavy-sector">
            <div class="sector-head"><span>3面(後)</span><span class="sector-count" id="c-zone-3">0</span></div>
            <div class="unit-list"></div>
        </div>
        <div id="zone-2" class="heavy-sector">
            <div class="sector-head"><span>2面(左)</span><span class="sector-count" id="c-zone-2">0</span></div>
            <div class="unit-list"></div>
        </div>
        
        <!-- 核心重地 -->
        <div id="zone-center" class="heavy-sector">
            <div class="sector-head"><span>內部/頂樓</span><span class="sector-count" id="c-zone-center">0</span></div>
            <div class="unit-list"></div>
        </div>
        
        <div id="zone-4" class="heavy-sector">
            <div class="sector-head"><span>4面(右)</span><span class="sector-count" id="c-zone-4">0</span></div>
            <div class="unit-list"></div>
        </div>
        <div id="zone-1" class="heavy-sector">
            <div class="sector-head"><span>1面(正)</span><span class="sector-count" id="c-zone-1">0</span></div>
            <div class="unit-list"></div>
        </div>
    </div>

    <!-- 歷史紀錄彈出視窗 -->
    <div id="history-modal" class="modal">
        <div class="modal-box">
            <div class="modal-head">歷史任務歸檔紀錄</div>
            <div id="history-container" style="padding:10px; overflow-y:auto; flex-grow: 1;"></div>
            <button class="close-btn" onclick="document.getElementById('history-modal').style.display='none'">關閉視窗</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, doc, onSnapshot, query, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD9oJirgoJCTU7h-ODfSpfwC80E5fqze2A",
            authDomain: "clawone-6445c.firebaseapp.com",
            projectId: "clawone-6445c",
            storageBucket: "clawone-6445c.firebasestorage.app",
            messagingSenderId: "945236029933",
            appId: "1:945236029933:web:f93ffb9e6f8b41aebd37e4",
            measurementId: "G-JEB18KRCXS"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- 時鐘 ---
        setInterval(() => {
            document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('zh-TW', { hour12: false });
        }, 1000);

        // --- 監聽當前任務 ---
        onSnapshot(doc(db, "system_state", "current_task"), (d) => {
            if (d.exists()) {
                document.getElementById('task-type').innerText = d.data().type;
                document.getElementById('task-address').innerText = d.data().address;
            } else {
                document.getElementById('task-type').innerText = "系統待命中";
                document.getElementById('task-address').innerText = "等待指令...";
            }
        });

        // --- 監聽現場部隊佈署 ---
        onSnapshot(collection(db, "fire_deployments"), (snap) => {
            const counts = { 'zone-1':0, 'zone-2':0, 'zone-3':0, 'zone-4':0, 'zone-center':0 };
            let total = 0;
            
            document.querySelectorAll('.unit-list').forEach(el => el.innerHTML = "");

            snap.forEach(d => {
                const data = d.data();
                const pStr = String(data.people || "0");
                const pNum = parseInt(pStr.replace(/[^0-9]/g, '')) || 0;
                const side = data.side || "";
                const time = data.updateTime ? data.updateTime.toDate().toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit', hour12: false }) : "--:--";

                let target = 'zone-1';
                if (side.includes("內部") || side.includes("頂樓")) target = 'zone-center';
                else if (side.includes("2")) target = 'zone-2';
                else if (side.includes("3")) target = 'zone-3';
                else if (side.includes("4")) target = 'zone-4';

                // 極致精簡卡片 (拔掉多餘中文字)
                const html = `
                    <div class="unit-plate">
                        <div class="plate-row">
                            <span class="unit-name">${data.team}</span>
                            <span class="unit-pax">${pStr}</span>
                        </div>
                        <div class="plate-row">
                            <span class="unit-task">${data.task}</span>
                            <span class="unit-time">${time}</span>
                        </div>
                    </div>`;
                document.querySelector(`#${target} .unit-list`).insertAdjacentHTML('beforeend', html);
                
                counts[target] += pNum; 
                total += pNum;
            });
            
            document.getElementById('grand-total').innerText = total;
            for(let k in counts) document.getElementById(`c-${k}`).innerText = counts[k];
        });

        // --- 歷史紀錄 ---
        onSnapshot(query(collection(db, "history_logs"), limit(10)), (snap) => {
            const container = document.getElementById('history-container');
            container.innerHTML = "";
            snap.forEach(d => {
                container.innerHTML += `<div class="log-item">${d.data().type} - ${d.data().address}</div>`;
            });
        });
    </script>
</body>
</html>
