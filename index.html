<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>即時救災人員配置圖</title>
    <style>
        /* 暗黑指揮中心風格 */
        body { 
            font-family: '微軟正黑體', sans-serif; 
            background-color: #121212; 
            color: white; 
            margin: 0; 
            padding: 10px; 
        }
        
        .header-container { text-align: center; margin-bottom: 20px; }
        h1 { color: #ff4d4d; letter-spacing: 2px; margin-bottom: 5px; font-size: 1.5rem; }
        .last-update { 
            font-size: 0.9em; 
            color: #00a8ff; 
            font-weight: bold; 
            background-color: rgba(0, 168, 255, 0.1); 
            padding: 5px 15px; 
            border-radius: 20px; 
            display: inline-block;
        }
        
        /* 戰術圖資排版 - 電腦版十字架 */
        .battleground {
            display: grid;
            grid-template-areas: 
                ". side3 ."
                "side4 center side2"
                ". side1 .";
            grid-template-columns: 1fr 1.8fr 1fr; /* 中間主建築稍微寬一點 */
            gap: 15px;
            max-width: 1200px;
            margin: auto;
        }

        /* 📱 手機版：區域改為垂直堆疊 */
        @media (max-width: 768px) {
            .battleground {
                grid-template-areas: 
                    "side3"
                    "side4"
                    "center"
                    "side2"
                    "side1";
                grid-template-columns: 1fr;
            }
        }

        .zone { 
            background-color: #1e1e1e; 
            border: 2px solid #333; 
            border-radius: 8px; 
            padding: 12px; 
            min-height: 80px; 
        }
        .zone h3 { 
            margin-top: 0; 
            text-align: center; 
            color: #aaa; 
            border-bottom: 1px solid #444; 
            padding-bottom: 8px; 
            font-size: 0.9rem;
        }
        
        #zone-center { grid-area: center; background-color: #3a0d0d; border: 2px dashed #ff4d4d; }
        #zone-center h3 { color: #ff4d4d; border-bottom: 1px dashed #ff4d4d; font-weight: bold; }
        
        #zone-1 { grid-area: side1; border-top: 4px solid #00a8ff; } 
        #zone-2 { grid-area: side2; border-left: 4px solid #00a8ff; } 
        #zone-3 { grid-area: side3; border-bottom: 4px solid #00a8ff; } 
        #zone-4 { grid-area: side4; border-right: 4px solid #00a8ff; } 

        /* 💡 核心排版邏輯：自動判斷 1個全寬、2個左右、3個以上兩排 */
        .teams {
            display: grid;
            /* 只要寬度超過 180px 就會並排，否則就單排 */
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }

        /* 隊伍卡片樣式 */
        .team-card { 
            background-color: #2c2c2c; 
            border-left: 4px solid #4cd137; 
            padding: 10px; 
            border-radius: 4px; 
            animation: flash 1s ease-out;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        
        #zone-center .team-card { border-left: 4px solid #ff4d4d; }
        
        .team-title { font-weight: bold; color: #f1c40f; font-size: 0.95rem; margin-bottom: 5px; }
        .team-detail { color: #ddd; font-size: 0.85rem; line-height: 1.4; }
        .team-time { 
            color: #777; 
            font-size: 0.7rem; 
            text-align: right; 
            margin-top: 8px; 
            border-top: 1px dashed #444; 
            padding-top: 5px; 
        }

        @keyframes flash { 0% { background-color: #4cd137; } 100% { background-color: #2c2c2c; } }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>🔥 救災人員即時配置</h1>
        <div id="global-time" class="last-update">系統連線中...</div>
    </div>

    <div class="battleground">
        <div id="zone-3" class="zone"><h3>3面 (後方)</h3><div class="teams"></div></div>
        <div id="zone-4" class="zone"><h3>4面 (左方)</h3><div class="teams"></div></div>
        <div id="zone-center" class="zone"><h3>🔥 起火建物 (頂樓/內部)</h3><div class="teams"></div></div>
        <div id="zone-2" class="zone"><h3>2面 (右方)</h3><div class="teams"></div></div>
        <div id="zone-1" class="zone"><h3>1面 (前方)</h3><div class="teams"></div></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // ✅ 已填入您圖片中的 Firebase 金鑰
        const firebaseConfig = {
            apiKey: "AIzaSyD9oJirgoJCTU7h-ODfSpfwC80E5fqze2A",
            authDomain: "clawone-6445c.firebaseapp.com",
            projectId: "clawone-6445c",
            storageBucket: "clawone-6445c.firebasestorage.app",
            messagingSenderId: "945236029933",
            appId: "1:945236029933:web:f93ffb9e6f8b41aebd37e4",
            measurementId: "G-JEB18KRCXS"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        onSnapshot(collection(db, "fire_deployments"), (snapshot) => {
            const now = new Date();
            document.getElementById('global-time').innerText = `🔄 更新時間：${now.toLocaleTimeString('zh-TW', { hour12: false })}`;

            // 清空所有區域
            const zones = ['zone-1', 'zone-2', 'zone-3', 'zone-4', 'zone-center'];
            zones.forEach(z => document.querySelector(`#${z} .teams`).innerHTML = "");

            snapshot.forEach((doc) => {
                const data = doc.data();
                let reportTime = data.updateTime ? data.updateTime.toDate().toLocaleTimeString('zh-TW', { hour12: false }) : "--:--";

                // 💡 修正：${data.people} 後方不加「人」字，避免出現「5人人」
                const cardHtml = `
                    <div class="team-card">
                        <div>
                            <div class="team-title">${data.team} (${data.people})</div>
                            <div class="team-detail">任務: ${data.task}</div>
                            <div class="team-detail">位置: ${data.address}</div>
                        </div>
                        <div class="team-time">⏱ ${reportTime}</div>
                    </div>
                `;

                // 分類邏輯
                if (data.side.includes("頂樓") || data.side.includes("內部")) {
                    document.querySelector('#zone-center .teams').innerHTML += cardHtml;
                } else if (data.side.includes("1")) {
                    document.querySelector('#zone-1 .teams').innerHTML += cardHtml;
                } else if (data.side.includes("2")) {
                    document.querySelector('#zone-2 .teams').innerHTML += cardHtml;
                } else if (data.side.includes("3")) {
                    document.querySelector('#zone-3 .teams').innerHTML += cardHtml;
                } else if (data.side.includes("4")) {
                    document.querySelector('#zone-4 .teams').innerHTML += cardHtml;
                }
            });
        });
    </script>
</body>
</html>
