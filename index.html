<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>火場戰術指揮系統 - 手機十字極限版</title>
    <style>
        :root {
            --frame-gray: #3a3f42; --inner-bg: #121416; --neon-blue: #3399ff;
            --neon-red: #ff4d4d; --neon-gold: #ffcc00; --neon-green: #00ffaa;
            --safe-green: #28a745; --evac-orange: #fd7e14;
        }

        * { box-sizing: border-box; }
        body { 
            font-family: 'Noto Sans TC', '微軟正黑體', sans-serif; 
            background-color: #050505; color: #eee; 
            margin: 0; padding: 0; height: 100vh; width: 100vw; 
            overflow: hidden; display: flex; flex-direction: column;
        }

        /* 頂部列 */
        .compact-header {
            display: flex; justify-content: space-between; align-items: center;
            background: #111; border-bottom: 2px solid #333; padding: 2px 10px; height: 50px; flex-shrink: 0;
        }
        .header-left { flex: 1; display: flex; flex-direction: column; align-items: flex-start; }
        .stat-label { font-size: 9px; color: #888; font-weight: bold; letter-spacing: 1px;}
        .stat-val { font-size: 20px; color: var(--neon-gold); font-family: Impact, sans-serif; line-height: 1; margin-top: 1px; }

        .header-center { flex: 2; display: flex; flex-direction: column; align-items: center; text-align: center; overflow: hidden;}
        #task-type { color: var(--neon-red); font-size: 15px; font-weight: 900; margin: 0; letter-spacing: 1px; white-space: nowrap; }
        #task-address { color: var(--neon-blue); font-size: 10px; margin-top: 2px; white-space: nowrap; font-weight: bold;}

        .header-right { flex: 1; display: flex; flex-direction: column; align-items: flex-end; }
        #live-date { color: #88ccff; font-size: 9px; font-family: monospace; font-weight: bold; margin-bottom: 2px;}
        #live-clock { color: var(--neon-green); font-size: 14px; font-family: monospace; font-weight: bold; line-height: 1; }

        /* 全螢幕自適應滿版十字網格佈局 */
        .tactical-grid { 
            display: grid; flex-grow: 1; padding: 6px; gap: 6px;
            grid-template-columns: 1fr 1fr 1fr; 
            grid-template-rows: 1fr 1fr 1fr; 
            grid-template-areas: 
                ". s3 ." 
                "s2 core s4" 
                ". s1 ."; 
            height: calc(100vh - 50px);
            width: 100vw;
        }

        /* 滿版區塊樣式 */
        .heavy-sector { 
            background: var(--inner-bg); 
            border: 1px solid var(--frame-gray); 
            border-radius: 6px; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            width: 100%;
            height: 100%; 
        }
        .sector-head { background: #2a2d31; padding: 3px 6px; font-size: 11px; font-weight: bold; border-bottom: 1px solid #000; display: flex; justify-content: space-between; align-items: center; color: #ccc; }
        .sector-count { background: #000; color: var(--neon-gold); padding: 1px 5px; border-radius: 6px; font-size: 11px; border: 1px solid #444; }

        /* 中間火場微調比例 */
        .zone-core { 
            grid-area: core; 
            border-color: #5a1a1a; 
            box-shadow: inset 0 0 15px rgba(255, 51, 51, 0.15); 
            transform: scale(0.96); 
        }
        .zone-core .sector-head { background: #660000; color: #fff; border-bottom: 1px solid var(--neon-red); }
        
        .zone-1 { grid-area: s1; border-top: 2px solid var(--neon-blue); } 
        .zone-2 { grid-area: s2; border-right: 2px solid var(--neon-blue); } 
        .zone-3 { grid-area: s3; border-bottom: 2px solid var(--neon-blue); } 
        .zone-4 { grid-area: s4; border-left: 2px solid var(--neon-blue); } 

        /* 主畫面列表一律改為單排垂直堆疊 */
        .unit-list { 
            flex-grow: 1; 
            overflow-y: auto; 
            padding: 4px; 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 3px; 
            align-content: start;
        }

        /* 大氣舒適卡片設計 */
        .unit-plate { 
            background: #1a1c1e; border: 1px solid #333; 
            border-left: 3px solid var(--safe-green);
            padding: 3px 5px; border-radius: 4px; cursor: pointer;
            transition: background 0.1s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 38px; 
        }
        .unit-plate:active { background: #333; }
        
        .zone-core .unit-plate { border-left-color: var(--neon-red); }
        .plate-standby { border-left-color: var(--neon-gold) !important; }

        .plate-row { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        
        .unit-name { font-weight: bold; color: var(--neon-gold); font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-grow: 1; margin-right: 2px; }
        .unit-pax { color: #fff; font-size: 9px; background: #000; padding: 1px 3px; border-radius: 2px; white-space: nowrap; flex-shrink: 0;}
        .unit-task { color: #ccc; font-size: 9px; font-weight: bold; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 60%; }
        .unit-time { color: var(--neon-green); font-family: monospace; font-size: 9px; font-weight: bold; margin-top: 1px; white-space: nowrap;}

        /* 浮動按鈕群 */
        .btn-group { position: fixed; bottom: 10px; right: 10px; z-index: 500; display: flex; flex-direction: column; gap: 8px; }
        .float-btn { background: rgba(30, 30, 30, 0.85); backdrop-filter: blur(2px); border: 1px solid #666; color: #fff; padding: 8px 14px; border-radius: 20px; font-size: 12px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.8); cursor: pointer; text-align: center; }
        #evac-btn { border-color: var(--evac-orange); color: var(--evac-orange); } /* 🟢 返隊待命橘色按鈕 */
        #standby-btn { border-color: var(--neon-gold); color: var(--neon-gold); }
        
        /* 彈出視窗 */
        .modal { display: none; position: fixed; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); }
        .modal-box { background: #1a1c1e; border: 2px solid #555; width: 90%; max-width: 600px; margin: 15% auto; max-height: 70vh; border-radius: 6px; display: flex; flex-direction: column; }
        .modal-head { padding: 12px; background: #000; color: var(--neon-gold); font-size: 15px; font-weight: bold; text-align: center; border-bottom: 1px solid #444; }
        .log-item { padding: 10px; border-bottom: 1px solid #333; color: #ccc; font-size: 13px; display: flex; justify-content: space-between; cursor: pointer; align-items: center;}
        .log-item:hover { background: #222; }
        .close-btn { background: #aa0000; color: #fff; border: none; padding: 12px; font-weight: bold; cursor: pointer; font-size: 14px; }
        
        /* 戰術回放全螢幕視窗 */
        #playback-modal .modal-box { width: 98%; max-width: 1000px; height: 95vh; max-height: 95vh; margin: 2% auto; background: #050505; border-color: var(--neon-blue); display: flex; flex-direction: column;}
        #pb-title { background: #002244; color: var(--neon-blue); border-bottom: 2px solid var(--neon-blue); }
        #playback-modal .tactical-grid { height: auto; flex-grow: 1; }
        
        /* 回放視窗內的返隊待命名單專區 */
        .pb-evac-zone { background: #111; border-top: 1px solid #333; padding: 8px; display: flex; flex-wrap: wrap; gap: 5px; max-height: 120px; overflow-y: auto;}

        /* 改良版 Toast 提示 */
        #toast { 
            position: fixed; top: -60px; left: 50%; transform: translateX(-50%); 
            background: rgba(0, 0, 0, 0.95); color: #fff; padding: 10px 20px; 
            border-radius: 30px; font-size: 14px; font-weight: bold; z-index: 10001; 
            transition: top 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55); 
            box-shadow: 0 4px 15px rgba(255,204,0,0.3); border: 1px solid var(--neon-gold);
            white-space: nowrap; pointer-events: none;
        }
        #toast.show { top: 60px; }

        ::-webkit-scrollbar { display: none; } 
    </style>
</head>
<body>

    <div id="toast">提示訊息</div>

    <div class="compact-header">
        <!-- 左上角：管制人數 -->
        <div class="header-left"><span class="stat-label">管制人數</span><div class="stat-val" id="grand-total">0</div></div>
        <div class="header-center"><h1 id="task-type">系統待命中</h1><div id="task-address">等待派遣指令...</div></div>
        <div class="header-right"><span id="live-date">YYYY-MM-DD</span><span id="live-clock">00:00:00</span></div>
    </div>

    <!-- 主畫面十字網格 -->
    <div class="tactical-grid" id="main-grid">
        <div class="heavy-sector zone-3" id="zone-3">
            <div class="sector-head">
                <span>三面<small id="squad-count-3" style="font-size: 9px; color: var(--neon-green); font-weight: normal; margin-left: 3px;"></small></span>
                <span class="sector-count" id="c-zone-3">0</span>
            </div>
            <div class="unit-list"></div>
        </div>
        <div class="heavy-sector zone-2" id="zone-2">
            <div class="sector-head">
                <span>二面<small id="squad-count-2" style="font-size: 9px; color: var(--neon-green); font-weight: normal; margin-left: 3px;"></small></span>
                <span class="sector-count" id="c-zone-2">0</span>
            </div>
            <div class="unit-list"></div>
        </div>
        <div class="heavy-sector zone-core" id="zone-center">
            <div class="sector-head">
                <span>火場<small id="squad-count-center" style="font-size: 9px; color: var(--neon-green); font-weight: normal; margin-left: 3px;"></small></span>
                <span class="sector-count" id="c-zone-center">0</span>
            </div>
            <div class="unit-list"></div>
        </div>
        <div class="heavy-sector zone-4" id="zone-4">
            <div class="sector-head">
                <span>四面<small id="squad-count-4" style="font-size: 9px; color: var(--neon-green); font-weight: normal; margin-left: 3px;"></small></span>
                <span class="sector-count" id="c-zone-4">0</span>
            </div>
            <div class="unit-list"></div>
        </div>
        <div class="heavy-sector zone-1" id="zone-1">
            <div class="sector-head">
                <span>一面<small id="squad-count-1" style="font-size: 9px; color: var(--neon-green); font-weight: normal; margin-left: 3px;"></small></span>
                <span class="sector-count" id="c-zone-1">0</span>
            </div>
            <div class="unit-list"></div>
        </div>
    </div>

    <!-- 右下角按鈕群 (🟢 已更名為 返隊待命) -->
    <div class="btn-group">
        <div class="float-btn" id="standby-btn" onclick="document.getElementById('standby-modal').style.display='block'">待命名單 (0)</div>
        <div class="float-btn" id="evac-btn" onclick="document.getElementById('evac-modal').style.display='block'">返隊待命 (0)</div>
        <div class="float-btn" onclick="document.getElementById('history-modal').style.display='block'">歷史紀錄</div>
    </div>

    <!-- 待命名單視窗 -->
    <div id="standby-modal" class="modal">
        <div class="modal-box" style="border-color: var(--neon-gold); max-width: 480px;">
            <div class="modal-head" style="color: var(--neon-gold);">目前待命集結分隊</div>
            <div id="standby-container" style="padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; overflow-y: auto; flex-grow: 1;">
                目前無待命分隊
            </div>
            <button class="close-btn" onclick="document.getElementById('standby-modal').style.display='none'">關閉視窗</button>
        </div>
    </div>

    <!-- 🟢 返隊待命分隊名單視窗 -->
    <div id="evac-modal" class="modal">
        <div class="modal-box" style="border-color: var(--evac-orange);">
            <div class="modal-head" style="color: var(--evac-orange);">返隊待命分隊名單</div>
            <div id="evac-container" style="padding:10px; overflow-y:auto; flex-grow: 1;">目前無返隊待命分隊</div>
            <button class="close-btn" onclick="document.getElementById('evac-modal').style.display='none'">關閉視窗</button>
        </div>
    </div>

    <!-- 歷史紀錄列表視窗 -->
    <div id="history-modal" class="modal">
        <div class="modal-box">
            <div class="modal-head">歷史任務歸檔紀錄</div>
            <div id="history-container" style="padding:10px; overflow-y:auto; flex-grow: 1;"></div>
            <button class="close-btn" onclick="document.getElementById('history-modal').style.display='none'">關閉視窗</button>
        </div>
    </div>

    <!-- 戰術回放全螢幕視窗 -->
    <div id="playback-modal" class="modal">
        <div class="modal-box">
            <div class="modal-head" id="pb-title">戰術回放：載入中...</div>
            
            <div class="tactical-grid" id="pb-grid">
                <div class="heavy-sector zone-3" id="pb-zone-3">
                    <div class="sector-head">
                        <span>三面<small id="pb-squad-count-3" style="font-size: 9px; color: var(--neon-green); font-weight: normal; margin-left: 3px;"></small></span>
                        <span class="sector-count"></span>
                    </div>
                    <div class="unit-list"></div>
                </div>
                <div class="heavy-sector zone-2" id="pb-zone-2">
                    <div class="sector-head">
                        <span>二面<small id="pb-squad-count-2" style="font-size: 9px; color: var(--neon-green); font-weight: normal; margin-left: 3px;"></small></span>
                        <span class="sector-count"></span>
                    </div>
                    <div class="unit-list"></div>
                </div>
                <div class="heavy-sector zone-core" id="pb-zone-center">
                    <div class="sector-head">
                        <span>火場<small id="pb-squad-count-center" style="font-size: 9px; color: var(--neon-green); font-weight: normal; margin-left: 3px;"></small></span>
                        <span class="sector-count"></span>
                    </div>
                    <div class="unit-list"></div>
                </div>
                <div class="heavy-sector zone-4" id="pb-zone-4">
                    <div class="sector-head">
                        <span>四面<small id="pb-squad-count-4" style="font-size: 9px; color: var(--neon-green); font-weight: normal; margin-left: 3px;"></small></span>
                        <span class="sector-count"></span>
                    </div>
                    <div class="unit-list"></div>
                </div>
                <div class="heavy-sector zone-1" id="pb-zone-1">
                    <div class="sector-head">
                        <span>一面<small id="pb-squad-count-1" style="font-size: 9px; color: var(--neon-green); font-weight: normal; margin-left: 3px;"></small></span>
                        <span class="sector-count"></span>
                    </div>
                    <div class="unit-list"></div>
                </div>
            </div>

            <div class="pb-evac-zone" id="pb-evac-list"></div>
            <button class="close-btn" onclick="document.getElementById('playback-modal').style.display='none'">關閉回放視窗</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, doc, onSnapshot, query, limit, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD9oJirgoJCTU7h-ODfSpfwC80E5fqze2A", authDomain: "clawone-6445c.firebaseapp.com", projectId: "clawone-6445c", storageBucket: "clawone-6445c.firebasestorage.app", messagingSenderId: "945236029933", appId: "1:945236029933:web:f93ffb9e6f8b41aebd37e4"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let toastTimeout;
        window.showReporter = function(name, team) {
            const t = document.getElementById('toast');
            t.innerHTML = `<span style="color:var(--neon-gold)">${team}</span> 👤登記人：${name}`;
            t.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => t.classList.remove('show'), 2500);
        };

        setInterval(() => {
            const now = new Date();
            const y = now.getFullYear(); const m = String(now.getMonth() + 1).padStart(2, '0'); const d = String(now.getDate()).padStart(2, '0');
            const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
            document.getElementById('live-date').innerText = `${y}-${m}-${d} (${weekdays[now.getDay()]})`;
            document.getElementById('live-clock').innerText = now.toLocaleTimeString('zh-TW', { hour12: false });
        }, 1000);

        onSnapshot(doc(db, "system_state", "current_task"), (d) => {
            if (d.exists()) {
                document.getElementById('task-type').innerText = d.data().type;
                document.getElementById('task-address').innerText = d.data().address;
            } else {
                document.getElementById('task-type').innerText = "系統待命中";
                document.getElementById('task-address').innerText = "等待派遣指令...";
            }
        });

        // 生成卡片
        function createCardHtml(data) {
            let pStr = String(data.people || "0").replace("人", "");
            pStr = pStr + "人";
            
            const side = data.side || "";
            const taskStr = data.task || "";
            let time = "--:--";
            if (data.updateTime && data.updateTime.toDate) {
                time = data.updateTime.toDate().toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit', hour12: false });
            } else if (data.updateTime && typeof data.updateTime === 'string') {
                time = data.updateTime.substring(11, 16);
            }

            let displayName = data.team || "";
            const leaderStr = data.leader || data.captain || "";
            if (leaderStr) {
                displayName = displayName.replace("分隊", "") + leaderStr;
            }

            const reporter = (data.reportedBy && data.reportedBy.name) ? data.reportedBy.name : "未知";
            let plateClass = "unit-plate"; 
            if (taskStr.includes("待命") || side.includes("集結") || side.includes("外部") || side.includes("待命")) plateClass += " plate-standby";

            return `
                <div class="${plateClass}" onclick="showReporter('${reporter}', '${data.team}')">
                    <div class="plate-row">
                        <span class="unit-name">${displayName}</span>
                        <span class="unit-pax">${pStr}</span>
                    </div>
                    <div class="plate-row">
                        <span class="unit-task">${taskStr}</span>
                        <span class="unit-time">${time}</span>
                    </div>
                </div>`;
        }

        // 智慧分流判定邏輯
        function getTargetZone(side) {
            if (!side) return '1';
            if (side.includes("內部") || side.includes("頂樓") || side.includes("火場")) return 'center';
            if (side.includes("2") || side.includes("二")) return '2';
            if (side.includes("3") || side.includes("三")) return '3';
            if (side.includes("4") || side.includes("四")) return '4';
            if (side.includes("集結") || side.includes("外部") || side.includes("待命")) return 'standby';
            return '1';
        }

        // 主畫面即時監聽
        onSnapshot(collection(db, "fire_deployments"), (snap) => {
            const counts = { '1':0, '2':0, '3':0, '4':0, 'center':0, 'standby':0 };
            const squadCounts = { '1':0, '2':0, '3':0, '4':0, 'center':0, 'standby':0 }; 
            let total = 0;
            let standbyCount = 0;
            
            document.querySelectorAll('#main-grid .unit-list').forEach(el => el.innerHTML = "");
            
            const standbyContainer = document.getElementById('standby-container');
            if (standbyContainer) standbyContainer.innerHTML = "";

            snap.forEach(d => {
                const data = d.data();
                const target = getTargetZone(data.side || "");
                const pNum = parseInt(String(data.people || "0").replace(/[^0-9]/g, '')) || 0;
                
                if (target === 'standby') {
                    standbyCount++;
                    if (standbyContainer) {
                        standbyContainer.insertAdjacentHTML('beforeend', createCardHtml(data));
                    }
                } else {
                    const listEl = document.querySelector(`#zone-${target} .unit-list`);
                    if (listEl) {
                        listEl.insertAdjacentHTML('beforeend', createCardHtml(data));
                    }
                    counts[target] += pNum; 
                    squadCounts[target]++; 
                }
            });
            
            // 管制人數計算
            const operationalTotal = counts['1'] + counts['2'] + counts['3'] + counts['4'] + counts['center'];
            document.getElementById('grand-total').innerText = operationalTotal;
            
            for(let k in counts) {
                const countEl = document.getElementById(`c-zone-${k}`);
                if (countEl) countEl.innerText = counts[k];

                const squadCountEl = document.getElementById(`squad-count-${k}`);
                if (squadCountEl) {
                    squadCountEl.innerText = squadCounts[k] > 0 ? ` (${squadCounts[k]}分隊)` : '';
                }
            }
            
            const standbyBtn = document.getElementById('standby-btn');
            if (standbyBtn) standbyBtn.innerText = `待命名單 (${standbyCount})`;
            if (standbyCount === 0 && standbyContainer) {
                standbyContainer.innerHTML = '<div style="color: #888; font-size: 13px; text-align: center; width:100%; grid-column: span 2; padding: 20px;">目前無待命分隊</div>';
            }
        });

        // 🟢 返隊待命監聽 (原 撤離名單 整合更新)
        onSnapshot(collection(db, "fire_evacuations"), (snap) => {
            const container = document.getElementById('evac-container');
            const btn = document.getElementById('evac-btn');
            container.innerHTML = ""; let evacCount = 0;
            snap.forEach(d => {
                evacCount++; const data = d.data();
                const time = data.evacTime ? data.evacTime.toDate().toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' }) : "--:--";
                const evacBy = (data.evacBy && data.evacBy.name) ? data.evacBy.name : "未知";
                container.innerHTML += `
                    <div class="log-item" style="border-left: 3px solid var(--evac-orange); padding-left: 8px;">
                        <span><b style="color:#fff;">${data.team}</b> (${data.people})</span>
                        <span style="font-size: 11px; color: #888;">👤${evacBy} | 返隊於 ${time}</span>
                    </div>`;
            });
            btn.innerText = `返隊待命 (${evacCount})`;
            if (evacCount === 0) container.innerHTML = "目前無返隊待命分隊";
        });

        // 歷史紀錄監聽與載入
        onSnapshot(query(collection(db, "history_logs"), orderBy("endTime", "desc"), limit(10)), (snap) => {
            const container = document.getElementById('history-container');
            container.innerHTML = "";
            snap.forEach(d => {
                const data = d.data();
                const div = document.createElement('div');
                div.className = 'log-item';
                div.innerHTML = `<span><b>${data.type}</b> - ${data.address}</span> <span style="color:var(--neon-blue); font-size:11px;">▶ 戰術回放</span>`;
                
                div.onclick = async () => {
                    document.getElementById('pb-title').innerText = `[結案回放] ${data.type} | ${data.address}`;
                    document.querySelectorAll('#pb-grid .unit-list').forEach(el => el.innerHTML = "");
                    
                    const pbCounts = { '1':0, '2':0, '3':0, '4':0, 'center':0 };
                    const pbSquadCounts = { '1':0, '2':0, '3':0, '4':0, 'center':0 };

                    if(data.deployments && data.deployments.length > 0) {
                        let pbStandbyHtml = [];
                        data.deployments.forEach(unit => {
                            const target = getTargetZone(unit.side || "");
                            if (target === 'standby') {
                                pbStandbyHtml.push(`<span style="display: inline-block; background: #222; border: 1px solid var(--neon-gold); color: var(--neon-gold); padding: 4px 8px; border-radius: 4px; font-size: 11px; margin: 2px;">🟡 ${unit.team} (${unit.people}) - 待命</span>`);
                            } else {
                                const pbListEl = document.querySelector(`#pb-zone-${target} .unit-list`);
                                if (pbListEl) {
                                    pbListEl.insertAdjacentHTML('beforeend', createCardHtml(unit));
                                }
                                const pNum = parseInt(String(unit.people || "0").replace(/[^0-9]/g, '')) || 0;
                                pbCounts[target] += pNum;
                                pbSquadCounts[target]++;
                            }
                        });
                        document.getElementById('pb-evac-list').innerHTML = pbStandbyHtml.join("") || `<span style="color:#888; font-size:11px;">(無待命資料)</span>`;
                    }
                    
                    for(let k in pbCounts) {
                        const countEl = document.querySelector(`#pb-zone-${k} .sector-count`);
                        if (countEl) countEl.innerText = pbCounts[k];
                        
                        const squadCountEl = document.getElementById(`pb-squad-count-${k}`);
                        if (squadCountEl) {
                            squadCountEl.innerText = pbSquadCounts[k] > 0 ? ` (${pbSquadCounts[k]}分隊)` : '';
                        }
                    }

                    document.getElementById('history-modal').style.display = 'none';
                    document.getElementById('playback-modal').style.display = 'block';
                };
                container.appendChild(div);
            });
            if(snap.empty) container.innerHTML = "目前尚無結案紀錄";
        });
    </script>
</body>
</html>
