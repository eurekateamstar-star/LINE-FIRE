<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>救災即時指揮中心</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', "微軟正黑體", sans-serif; 
            background-color: #000; color: white; 
            margin: 0; padding: 0; 
            height: 100vh; width: 100vw; 
            display: flex; flex-direction: column; overflow: hidden; 
        }
        
        /* 標題區域極限壓縮 - 三路並排 */
        .header-container { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 4px 10px; border-bottom: 1px solid #333; 
            height: 55px; flex-shrink: 0; background: #050505;
        }
        .header-left { flex: 1; text-align: left; }
        .header-center { flex: 2; text-align: center; }
        .header-right { flex: 1; text-align: right; }

        .stats-bar { font-size: 10px; color: #f1c40f; line-height: 1.2; }
        #task-type { color: #ff4d4d; margin: 0; font-size: 1.1rem; font-weight: bold; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        #task-address { color: #00a8ff; font-size: 11px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }

        #history-btn { 
            background: #1a1a1a; color: #00ffcc; border: 1px solid #00ffcc; 
            padding: 4px 8px; border-radius: 4px; font-size: 11px; cursor: pointer;
        }

        /* 戰術地圖區 - 調整比例 */
        .battleground { 
            display: grid; flex-grow: 1; gap: 3px; padding: 3px;
            grid-template-areas: ". side3 ." "side2 center side4" ". side1 ."; 
            grid-template-columns: 1fr 1.6fr 1fr; 
            grid-template-rows: 1fr 1.4fr 1.2fr; 
        }
        .zone { background-color: #0c0c0c; border: 1px solid #222; border-radius: 4px; display: flex; flex-direction: column; overflow: hidden; }
        .zone h3 { margin: 0; text-align: center; color: #777; background: #151515; font-size: 11px; padding: 2px 0; border-bottom: 1px solid #222; }
        
        #zone-center { grid-area: center; background-color: #1a0505; border: 1px dashed #ff4d4d; }
        #zone-center h3 { color: #ff4d4d; background: #2d0a0a; font-weight: bold; }
        
        #zone-1 { grid-area: side1; border-top: 2px solid #00a8ff; } 
        #zone-2 { grid-area: side2; border-right: 2px solid #00a8ff; } 
        #zone-3 { grid-area: side3; border-bottom: 2px solid #00a8ff; } 
        #zone-4 { grid-area: side4; border-left: 2px solid #00a8ff; } 

        .teams { flex-grow: 1; overflow-y: auto; padding: 2px; display: flex; flex-direction: column; gap: 3px; }

        /* 隊伍卡片極簡化 */
        .team-card { 
            background-color: #1a1a1a; border-left: 3px solid #4cd137; 
            padding: 4px 6px; border-radius: 2px; 
        }
        #zone-center .team-card { border-left: 3px solid #ff4d4d; }
        
        .team-title { 
            font-weight: bold; color: #f1c40f; font-size: 12px; 
            display: flex; justify-content: space-between; margin-bottom: 1px;
        }
        .team-title span:last-child { color: white; background: #333; padding: 0 4px; border-radius: 2px; font-size: 10px; }

        .info-row { font-size: 10px; color: #bbb; line-height: 1.2; display: flex; gap: 5px; }
        .info-row span { color: #888; }

        /* Modal */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); }
        .modal-content { background: #111; margin: 10% auto; border: 1px solid #444; width: 90%; max-width: 500px; border-radius: 8px; max-height: 80vh; display: flex; flex-direction: column; }
        .modal-header { padding: 10px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 10px; overflow-y: auto; font-size: 13px; }
        .close-btn { color: #888; font-size: 24px; cursor: pointer; }

        .teams::-webkit-scrollbar { width: 2px; }
        .teams::-webkit-scrollbar-thumb { background: #333; }
    </style>
</head>
<body>

    <div class="header-container">
        <div class="header-left">
            <div class="stats-bar">
                總計: <span id="grand-total">0</span>人<br>
                🕒 <span id="real-time">00:00</span>
            </div>
        </div>
        <div class="header-center">
            <h1 id="task-type">待命中心</h1>
            <div id="task-address">目前無任務</div>
        </div>
        <div class="header-right">
            <button id="history-btn">歷史</button>
        </div>
    </div>

    <div class="battleground">
        <div id="zone-3" class="zone"><h3>3面(後) <span id="c-zone-3">0</span></h3><div class="teams"></div></div>
        <div id="zone-2" class="zone"><h3>2面(左) <span id="c-zone-2">0</span></h3><div class="teams"></div></div>
        <div id="zone-center" class="zone"><h3>🔥 內部 <span id="c-zone-center">0</span></h3><div class="teams"></div></div>
        <div id="zone-4" class="zone"><h3>4面(右) <span id="c-zone-4">0</span></h3><div class="teams"></div></div>
        <div id="zone-1" class="zone"><h3>1面(前) <span id="c-zone-1">0</span></h3><div class="teams"></div></div>
    </div>

    <div id="history-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h3>歷史任務 (最近10筆)</h3><span class="close-btn" id="close-modal">&times;</span></div>
            <div class="modal-body" id="history-container"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, doc, onSnapshot, query, limit, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD9oJirgoJCTU7h-ODfSpfwC80E5fqze2A",
            authDomain: "clawone-6445c.firebaseapp.com",
            projectId: "clawone-6445c",
            storageBucket: "clawone-6445c.firebasestorage.app",
            messagingSenderId: "945236029933",
            appId: "1:945236029933:web:f93ffb9e6f8b41aebd37e4",
            measurementId: "G-JEB18KRCXS"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const modal = document.getElementById("history-modal");
        document.getElementById("history-btn").onclick = () => modal.style.display = "block";
        document.getElementById("close-modal").onclick = () => modal.style.display = "none";

        onSnapshot(doc(db, "system_state", "current_task"), (d) => {
            if (d.exists()) {
                document.getElementById('task-type').innerText = d.data().type || "火警";
                document.getElementById('task-address').innerText = d.data().address || "-";
            } else {
                document.getElementById('task-type').innerText = "待命中心";
                document.getElementById('task-address').innerText = "目前無執行中任務";
            }
        });

        onSnapshot(collection(db, "fire_deployments"), (snap) => {
            const counts = { 'zone-1':0, 'zone-2':0, 'zone-3':0, 'zone-4':0, 'zone-center':0 };
            let total = 0;
            document.querySelectorAll('.teams').forEach(el => el.innerHTML = "");

            snap.forEach(d => {
                const data = d.data();
                const pStr = String(data.people || "0");
                const pNum = parseInt(pStr.replace(/[^0-9]/g, '')) || 0;
                const side = data.side || "";
                
                let target = 'zone-1';
                if (side.includes("內部") || side.includes("頂樓")) target = 'zone-center';
                else if (side.includes("2")) target = 'zone-2';
                else if (side.includes("3")) target = 'zone-3';
                else if (side.includes("4")) target = 'zone-4';

                // 任務與位置放在同一行顯示以節省空間
                const html = `
                    <div class="team-card">
                        <div class="team-title"><span>${data.team}</span><span>${pStr}</span></div>
                        <div class="info-row"><span>任:</span>${data.task} <span>位:</span>${data.address}</div>
                    </div>`;
                document.querySelector(`#${target} .teams`).insertAdjacentHTML('beforeend', html);
                counts[target] += pNum; total += pNum;
            });
            document.getElementById('grand-total').innerText = total;
            for(let k in counts) document.getElementById(`c-${k}`).innerText = counts[k];
            document.getElementById('real-time').innerText = new Date().toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false});
        });

        onSnapshot(query(collection(db, "history_logs"), limit(10)), (snap) => {
            const container = document.getElementById('history-container');
            container.innerHTML = snap.empty ? "無資料" : "";
            snap.forEach(d => {
                const data = d.data();
                const time = data.endTime?.toDate ? data.endTime.toDate().toLocaleString('zh-TW') : "-";
                container.innerHTML += `<div style="border-bottom:1px solid #333; padding:5px 0;"><b>${data.type}</b> (${time})<br><small>${data.address}</small></div>`;
            });
        });
    </script>
</body>
</html>
